version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  target-branch: 0.7.x
  ignore:
  - dependency-name: yargs-parser
    versions:
    - 20.2.4
    - 20.2.5
    - 20.2.6
  - dependency-name: node-notifier
    versions:
    - 8.0.1
- package-ecosystem: composer
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  target-branch: 0.7.x
  ignore:
  - dependency-name: utopia-php/framework
    versions:
    - 0.10.0
    - 0.10.1
    - 0.10.2
    - 0.11.0
    - 0.12.0
    - 0.12.1
    - 0.12.2
    - 0.12.3
    - 0.13.0
  - dependency-name: swoole/ide-helper
    versions:
    - 4.6.2
    - 4.6.3
    - 4.6.4
    - 4.6.5
  - dependency-name: phpunit/phpunit
    versions:
    - 9.5.1
    - 9.5.2
    - 9.5.3
  - dependency-name: phpmailer/phpmailer
    versions:
    - 6.2.0
    - 6.3.0
  - dependency-name: utopia-php/cli
    versions:
    - 0.10.0
  - dependency-name: utopia-php/abuse
    versions:
    - 0.3.1
- package-ecosystem: docker
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  target-branch: 0.7.x
  ignore:
  - dependency-name: php
    versions:
    - 8.0.1.pre.cli.pre.alpine
    - 8.0.2.pre.cli.pre.alpine
